name: Release Bundles

on:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: release-bundles-${{ github.event.release.tag_name }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  APPLE_SIGNING_IDENTITY: "-"
  HAS_APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE != '' }}

jobs:
  build:
    name: Build ${{ matrix.platform }} ${{ matrix.args }}
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 90

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.platform }}-${{ matrix.args }}

      - name: Install Linux bundle dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate macOS signing secrets
        if: matrix.platform == 'macos-latest'
        env:
          HAS_APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE != '' }}
          HAS_APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD != '' }}
          HAS_KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD != '' }}
          HAS_APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID != '' }}
          HAS_APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID != '' }}
          HAS_APPLE_API_KEY: ${{ secrets.APPLE_API_KEY != '' }}
        run: |
          set -euo pipefail
          present=0
          missing=()
          check_secret() {
            local name="$1"
            local value="$2"
            if [ "$value" = "true" ]; then
              present=1
            else
              missing+=("$name")
            fi
          }

          check_secret APPLE_CERTIFICATE "$HAS_APPLE_CERTIFICATE"
          check_secret APPLE_CERTIFICATE_PASSWORD "$HAS_APPLE_CERTIFICATE_PASSWORD"
          check_secret KEYCHAIN_PASSWORD "$HAS_KEYCHAIN_PASSWORD"
          check_secret APPLE_API_ISSUER_ID "$HAS_APPLE_API_ISSUER_ID"
          check_secret APPLE_API_KEY_ID "$HAS_APPLE_API_KEY_ID"
          check_secret APPLE_API_KEY "$HAS_APPLE_API_KEY"

          if [ "$present" -eq 1 ] && [ "${#missing[@]}" -gt 0 ]; then
            printf '::error::Partial Apple signing configuration. Missing: %s\n' "${missing[*]}"
            exit 1
          fi

          if [ "$present" -eq 0 ]; then
            echo "Apple Developer ID secrets are not configured; macOS bundles will use ad-hoc signing."
          else
            echo "Apple Developer ID secrets are complete; macOS bundles will be signed and notarized via App Store Connect API key."
          fi

      - name: Prepare macOS signing
        if: matrix.platform == 'macos-latest' && env.HAS_APPLE_CERTIFICATE == 'true'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE_PASSWORD" ] || [ -z "$KEYCHAIN_PASSWORD" ]; then
            echo "::error::APPLE_CERTIFICATE requires APPLE_CERTIFICATE_PASSWORD and KEYCHAIN_PASSWORD."
            exit 1
          fi

          if [ -z "$APPLE_API_ISSUER_ID" ] || [ -z "$APPLE_API_KEY_ID" ] || [ -z "$APPLE_API_KEY" ]; then
            echo "::error::APPLE_CERTIFICATE requires APPLE_API_ISSUER_ID, APPLE_API_KEY_ID, and APPLE_API_KEY (base64 .p8) for notarization."
            exit 1
          fi

          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security list-keychains -d user -s build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

          CERT_ID=$(security find-identity -v -p codesigning build.keychain | awk -F'"' '/Developer ID Application/ { print $2; exit }')
          if [ -z "$CERT_ID" ]; then
            echo "Developer ID Application certificate not found in imported keychain." >&2
            security find-identity -v -p codesigning build.keychain
            exit 1
          fi
          echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> "$GITHUB_ENV"

          api_key_dir="$RUNNER_TEMP/appstoreconnect"
          mkdir -p "$api_key_dir"
          api_key_path="$api_key_dir/AuthKey_${APPLE_API_KEY_ID}.p8"
          echo "$APPLE_API_KEY" | base64 --decode > "$api_key_path"
          chmod 600 "$api_key_path"
          echo "APPLE_API_KEY_PATH=$api_key_path" >> "$GITHUB_ENV"

      - name: Build and upload Tauri bundles
        if: matrix.platform != 'macos-latest' || env.HAS_APPLE_CERTIFICATE != 'true'
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ github.event.release.id }}
          tauriScript: pnpm tauri
          args: ${{ matrix.args }}
          includeUpdaterJson: true
          assetNamePattern: Anchor_[version]_[platform]_[arch]_[bundle][ext]

      - name: Build and upload notarized Tauri bundles
        if: matrix.platform == 'macos-latest' && env.HAS_APPLE_CERTIFICATE == 'true'
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ github.event.release.id }}
          tauriScript: pnpm tauri
          args: ${{ matrix.args }}
          includeUpdaterJson: true
          assetNamePattern: Anchor_[version]_[platform]_[arch]_[bundle][ext]

  cli-macos:
    name: Build CLI macOS ${{ matrix.asset_arch }}
    runs-on: macos-latest
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            asset_arch: aarch64
          - target: x86_64-apple-darwin
            asset_arch: x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: cli-${{ matrix.target }}

      - name: Build CLI
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          TARGET: ${{ matrix.target }}
          ASSET_ARCH: ${{ matrix.asset_arch }}
        run: |
          set -euo pipefail
          version="${RELEASE_TAG#v}"
          cargo build --manifest-path src-tauri/Cargo.toml --release --bin anchor-cli --target "$TARGET"
          rm -rf dist-cli
          mkdir -p dist-cli
          install -m 0755 "src-tauri/target/$TARGET/release/anchor-cli" dist-cli/anchor
          asset="anchor-cli_${version}_darwin_${ASSET_ARCH}.tar.gz"
          tar -czf "$asset" -C dist-cli anchor
          shasum -a 256 "$asset" | awk '{print $1}' > "$asset.sha256"
          echo "ASSET=$asset" >> "$GITHUB_ENV"

      - name: Upload CLI release asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: gh release upload "$RELEASE_TAG" "$ASSET" "$ASSET.sha256" --clobber
