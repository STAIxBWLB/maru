name: Release Bundles

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to (re)build. Must already exist (e.g. v0.2.13)."
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-bundles-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  APPLE_SIGNING_IDENTITY: "-"
  HAS_APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE != '' }}

jobs:
  build:
    name: Build ${{ matrix.platform }} ${{ matrix.args }}
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 90

    strategy:
      fail-fast: false
      # Serialize matrix legs: all legs update the shared release asset
      # `latest.json` (updater manifest) via tauri-action. Running them
      # concurrently raced the update-release-asset call (one leg's PATCH 404s
      # when another recreated the asset), failing a leg and skipping the
      # gated homebrew-tap job. Sequential legs each merge their platform into
      # latest.json with no race.
      max-parallel: 1
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
          # Intentionally tracks latest. The Visual Studio 2026 migration of
          # windows-latest (rollout 2026-06-08 → 2026-06-15) is accepted; the
          # runner migration notice is informational and clears after migration.
          - platform: windows-latest
            args: ""

    steps:
      - name: Resolve release
        id: release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_TAG: ${{ github.event.release.tag_name }}
          EVENT_ID: ${{ github.event.release.id }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [ -n "$EVENT_ID" ]; then
            tag="$EVENT_TAG"
            id="$EVENT_ID"
          else
            tag="$INPUT_TAG"
            id=$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$tag" --jq .id)
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "id=$id" >> "$GITHUB_OUTPUT"
          echo "Resolved release: tag=$tag id=$id"

      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22.22.3
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.platform }}-${{ matrix.args }}

      - name: Install Linux bundle dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            libfuse2 \
            librsvg2-dev \
            patchelf \
            rpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate macOS signing secrets
        if: matrix.platform == 'macos-latest'
        env:
          HAS_APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE != '' }}
          HAS_APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD != '' }}
          HAS_KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD != '' }}
        run: |
          set -euo pipefail
          # Developer ID signing prerequisites. Notarization (re-enabled) runs
          # later inside tauri-action via APPLE_ID/PASSWORD/TEAM_ID; it requires
          # a Developer ID-signed bundle, so the cert config below must be complete.
          present=0
          missing=()
          check_secret() {
            local name="$1"
            local value="$2"
            if [ "$value" = "true" ]; then
              present=1
            else
              missing+=("$name")
            fi
          }

          check_secret APPLE_CERTIFICATE "$HAS_APPLE_CERTIFICATE"
          check_secret APPLE_CERTIFICATE_PASSWORD "$HAS_APPLE_CERTIFICATE_PASSWORD"
          check_secret KEYCHAIN_PASSWORD "$HAS_KEYCHAIN_PASSWORD"

          if [ "$present" -eq 1 ] && [ "${#missing[@]}" -gt 0 ]; then
            printf '::error::Partial Apple signing configuration. Missing: %s\n' "${missing[*]}"
            exit 1
          fi

          if [ "$present" -eq 0 ]; then
            echo "Apple Developer ID secrets are not configured; macOS bundles will use ad-hoc signing."
          else
            echo "Apple Developer ID secrets present; macOS bundles will be signed and notarized."
          fi

      - name: Prepare macOS signing
        if: matrix.platform == 'macos-latest' && env.HAS_APPLE_CERTIFICATE == 'true'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE_PASSWORD" ] || [ -z "$KEYCHAIN_PASSWORD" ]; then
            echo "::error::APPLE_CERTIFICATE requires APPLE_CERTIFICATE_PASSWORD and KEYCHAIN_PASSWORD."
            exit 1
          fi

          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security list-keychains -d user -s build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

          CERT_ID=$(security find-identity -v -p codesigning build.keychain | awk -F'"' '/Developer ID Application/ { print $2; exit }')
          if [ -z "$CERT_ID" ]; then
            echo "Developer ID Application certificate not found in imported keychain." >&2
            security find-identity -v -p codesigning build.keychain
            exit 1
          fi
          echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> "$GITHUB_ENV"

      # Notarization re-enabled (2026-06): Apple notary now accepts signed
      # Anchor bundles again (verified locally — submission Accepted in ~1 min).
      # tauri-action notarizes macOS bundles when APPLE_ID + APPLE_PASSWORD
      # (app-specific) + APPLE_TEAM_ID are present; non-macOS legs ignore them.
      # If the notary stalls again, drop the three APPLE_ID/PASSWORD/TEAM_ID
      # env lines below to fall back to Developer ID signing only.
      - name: Build and upload Tauri bundles
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPIMAGE_EXTRACT_AND_RUN: ${{ matrix.platform == 'ubuntu-22.04' && '1' || '' }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ matrix.platform == 'macos-latest' && secrets.APPLE_ID || '' }}
          APPLE_PASSWORD: ${{ matrix.platform == 'macos-latest' && secrets.APPLE_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ matrix.platform == 'macos-latest' && secrets.APPLE_TEAM_ID || '' }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ steps.release.outputs.id }}
          tauriScript: pnpm tauri
          args: ${{ matrix.args }}
          includeUpdaterJson: true
          assetNamePattern: Anchor_[version]_[platform]_[arch]_[bundle][ext]

  cli-macos:
    name: Build CLI macOS ${{ matrix.asset_arch }}
    runs-on: macos-latest
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            asset_arch: aarch64
          - target: x86_64-apple-darwin
            asset_arch: x86_64

    steps:
      - name: Resolve release
        id: release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_TAG: ${{ github.event.release.tag_name }}
          EVENT_ID: ${{ github.event.release.id }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [ -n "$EVENT_ID" ]; then
            tag="$EVENT_TAG"
            id="$EVENT_ID"
          else
            tag="$INPUT_TAG"
            id=$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$tag" --jq .id)
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "id=$id" >> "$GITHUB_OUTPUT"
          echo "Resolved release: tag=$tag id=$id"

      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: cli-${{ matrix.target }}

      - name: Build CLI
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          TARGET: ${{ matrix.target }}
          ASSET_ARCH: ${{ matrix.asset_arch }}
        run: |
          set -euo pipefail
          version="${RELEASE_TAG#v}"
          cargo build --manifest-path src-tauri/Cargo.toml --release --bin anchor-cli --target "$TARGET"
          rm -rf dist-cli
          mkdir -p dist-cli
          install -m 0755 "src-tauri/target/$TARGET/release/anchor-cli" dist-cli/anchor
          asset="anchor-cli_${version}_darwin_${ASSET_ARCH}.tar.gz"
          tar -czf "$asset" -C dist-cli anchor
          shasum -a 256 "$asset" | awk '{print $1}' > "$asset.sha256"
          echo "ASSET=$asset" >> "$GITHUB_ENV"

      - name: Upload CLI release asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: gh release upload "$RELEASE_TAG" "$ASSET" "$ASSET.sha256" --clobber

  homebrew-tap:
    name: Update Homebrew tap
    needs: [build, cli-macos]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Resolve release
        id: release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_TAG: ${{ github.event.release.tag_name }}
          EVENT_ID: ${{ github.event.release.id }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [ -n "$EVENT_ID" ]; then
            tag="$EVENT_TAG"
            id="$EVENT_ID"
          else
            tag="$INPUT_TAG"
            id=$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$tag" --jq .id)
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "id=$id" >> "$GITHUB_OUTPUT"
          echo "Resolved release: tag=$tag id=$id"

      - name: Checkout anchor
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Checkout tap
        uses: actions/checkout@v5
        with:
          repository: STAIxBWLB/homebrew-cask
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22.22.3
          package-manager-cache: false

      - name: Configure git identity
        working-directory: tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Render and push tap update
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release.outputs.tag }}
        run: node scripts/update-homebrew-tap.mjs "$TAG" tap --commit --push
