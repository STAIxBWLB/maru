name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  # dorny/paths-filter reads the PR file list via the API on pull_request runs.
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: make verify
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # Classify the change so skill-only edits (OTA bundle content) skip the
      # heavy app toolchain. Unknown diffs classify as app changes (safe).
      - name: Classify changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            skills:
              - 'skills/**'
            app:
              - '!(skills/**)'

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22.22.3
          cache: pnpm

      - name: Verify skills bundle content
        if: steps.changes.outputs.skills == 'true'
        run: make skills-verify

      - name: Setup Rust
        if: steps.changes.outputs.app == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        if: steps.changes.outputs.app == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ci-ubuntu-22.04

      - name: Install Linux Tauri dependencies
        if: steps.changes.outputs.app == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install frontend dependencies
        if: steps.changes.outputs.app == 'true'
        run: pnpm install --frozen-lockfile

      - name: Run verify (typecheck + i18n lint + vitest + cargo test --lib + build)
        if: steps.changes.outputs.app == 'true'
        run: make verify
