# Action vocabulary — Korean + English verb surface forms mapped to canonical action keys.
# Used by materialize.py to create [[action:<canon>]] wiki-links when a prompt mentions any surface form.
#
# Schema:
#   actions:
#     - canon: <canonical_action_id>      # kebab-case English
#       surface: [<ko1>, <ko2>, <en1>, ...]  # literal tokens to match (case-insensitive for en, exact for ko)

