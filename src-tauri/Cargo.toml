[package]
name = "anchor"
version = "0.1.0"
description = "Local-first Anchor/RISE document vault and AI editing desktop app"
authors = ["Anchor Contributors"]
license = "UNLICENSED"
edition = "2021"
rust-version = "1.77.2"

[lib]
name = "anchor_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2.5.4", features = [] }

[dependencies]
chrono = { version = "0.4", features = ["serde"] }
dirs = "5"
regex = "1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
tauri = { version = "2.10.0", features = [] }
tauri-plugin-dialog = "2"
uuid = { version = "1", features = ["v4"] }
walkdir = "2"

[dev-dependencies]
tempfile = "3"
